<html>
    <head>
        <link rel="stylesheet" href="./css/main.css"><link/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <h1 class="title">QR Burger</h1>
        <button id="giveMeMoneyButton" type="button" onclick="window.open('https://patreon.com/Velvii?utm_medium=unknown&utm_source=join_link&utm_campaign=creatorshare_creator&utm_content=copyLink', '_blank', 'noopener,noreferrer')">$</button>
        <div class="scene-switcher">
            <button class="selected" id="createBut">Create</button>
            <button id="scanBut">Scan</button>
        </div>
        <div class="create">
            <h2 id="burgLimit">17</h2>
            <div class="burger">
            </div>
            <input type="text" maxlength="40" placeholder="Burger Name" id="burgerName">
            <div class="createToolbar">
                <div>
                    <button id="topBunButton">Top Bun</button>
                    <button id="bottomBunButton">Bottom Bun</button>
                    <button id="pattyButton">Patty</button>
                    <button id="cheeseButton">Cheese</button>
                    <button id="lettuceButton">Lettuce</button>
                    <button id="tomatoesButton">Tomatoes</button>
                    <button id="picklesButton">Pickles</button>
                    <button id="baconButton">Bacon</button>
                    <button id="mustardButton">Mustard</button>
                    <button id="mayoButton">Mayo</button>
                    <button id="ketchupButton">Ketchup</button>
                    <button id="deleteButton">Delete</button>
                </div>
                <button id="shareButton">Share</button>
            </div>
        </div>
        <div class="shareQRCodePopup">
            <div>
                <img src="./assets/NoBurgerWarning.png">
                <div>
                    <button id="shareQRCodePopupShareButton">Share</button>
                    <button id="shareQRCodePopupCloseButton">Close</button>
                </div>
            </div>
        </div>
        <div class="scan">
            <div class="sharedBurgerPreview">
                <h2>Shared Burger</h2>
                <p id="sharedBurgerStatus">Scan a burger QR code to preview it.</p>
                <div class="sharedBurger" id="sharedBurger"></div>
            </div>
            <div id="reader" width="700px"></div>
        </div>
        <script src="./javascript/main.js" type="module"></script>
    </body>
</html>
